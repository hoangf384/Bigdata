version: 2

models:
  - name: int_users
    description: "Bảng định danh người dùng gốc (Identity Spine). Dùng làm gốc để join các log."
    columns:
      - name: user_id
        tests:
          - unique
          - not_null

  - name: int_contracts
    description: "Bảng cầu nối Hợp đồng - Người dùng. Cho biết Hợp đồng thuộc về ai."
    columns:
      - name: contract
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
          - relationships:
              to: ref('int_users')
              field: user_id

  - name: fct_search_logs
    description: "Bảng Fact ghi nhận chi tiết lịch sử tìm kiếm."
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
          - relationships:
              to: ref('int_users')
              field: user_id

  - name: fct_content_logs
    description: "Bảng Fact ghi nhận lịch sử xem nội dung."
    columns:
      - name: log_id
        tests:
          - unique
          - not_null
      - name: contract
        tests:
          - not_null
          - relationships:
              to: ref('int_contracts')
              field: contract

  - name: fct_user_views
    description: "Bảng Fact tổng hợp lịch sử lượt xem."
    columns:
      - name: user_id
        tests:
          - not_null
          - relationships:
              to: ref('int_users')
              field: user_id

  - name: int_standardized_mapping
    description: "Bảng mapping từ khóa và danh mục chuẩn hóa."
    columns:
      - name: keyword
        tests:
          - unique
          - not_null

  - name: int_user_device_summary
    description: "Tổng hợp thông tin thiết bị (Mac address) và platform mà người dùng sử dụng."

  - name: int_user_loyalty_metrics
    description: "Tính toán các chỉ số về lòng trung thành như ngày hoạt động đầu tiên/cuối cùng, thâm niên và số ngày hoạt động."

  - name: int_user_monthly_most_search
    description: "Xác định từ khóa được tìm kiếm nhiều nhất của mỗi người dùng theo từng tháng."

  - name: int_user_view_summary
    description: "Tổng hợp số lượt xem của người dùng qua các tháng."
