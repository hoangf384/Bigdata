version: 2

sources:
  - name: raw
    dataset: televisiondata
    description: "Dữ liệu thô từ hệ thống log trên GCS (Bronze Layer - Parquet)"
    tables:
      - name: log_content
        description: "Raw Parquet content viewing logs from users."
        external:
          location: "gs://bigdata-proj/bronze/log_content/*.parquet"
          options:
            format: PARQUET
        
      - name: log_search
        description: "Raw Parquet search logs from users."
        external:
          location: "gs://bigdata-proj/bronze/log_search/*.parquet"
          options:
            format: PARQUET

      - name: contracts
        description: "Raw Parquet contract and equipment definitions."
        external:
          location: "gs://bigdata-proj/bronze/contracts/*.parquet"
          options:
            format: PARQUET
        
      - name: user_registrations
        description: "Raw Parquet user registration logs."
        external:
          location: "gs://bigdata-proj/bronze/user_registrations/*.parquet"
          options:
            format: PARQUET

      - name: thang4
        description: "Raw Parquet viewership log for April."
        external:
          location: "gs://bigdata-proj/bronze/months/thang4/*.parquet"
          options:
            format: PARQUET

      - name: thang5
        description: "Raw Parquet viewership log for May."
        external:
          location: "gs://bigdata-proj/bronze/months/thang5/*.parquet"
          options:
            format: PARQUET

      - name: thang6
        description: "Raw Parquet viewership log for June."
        external:
          location: "gs://bigdata-proj/bronze/months/thang6/*.parquet"
          options:
            format: PARQUET

      - name: keyword_mapping
        description: "Keyword category mapping (Parquet)."
        external:
          location: "gs://bigdata-proj/bronze/keyword_mapping/*.parquet"
          options:
            format: PARQUET
