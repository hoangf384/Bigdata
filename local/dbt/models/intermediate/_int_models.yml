version: 2

models:
  - name: fct_search_logs
    description: "Bảng Fact ghi nhận chi tiết lịch sử tìm kiếm."
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_id
      - name: platform
        tests:
          - accepted_values:
              values: ['iOS', 'Android', 'SmartTV', 'Web', 'Box']

  - name: fct_content_logs
    description: "Bảng Fact ghi nhận lịch sử xem nội dung."
    columns:
      - name: log_id
        tests:
          - unique
          - not_null
      - name: contract
        tests:
          - not_null
          - relationships:
              to: ref('dim_contracts')
              field: contract

  - name: fct_user_views
    description: "Bảng Fact tổng hợp lịch sử lượt xem."
    columns:
      - name: user_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_id
      - name: total_view
        tests:
          - dbt_utils.not_negative

  - name: int_standardized_mapping
    description: "Bảng mapping từ khóa và danh mục chuẩn hóa."
    columns:
      - name: keyword
        tests:
          - unique
          - not_null
