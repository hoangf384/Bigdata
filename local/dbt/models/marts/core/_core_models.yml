version: 2

models:
  - name: fct_customer_content_stats
    description: "Bảng Fact tổng hợp hành vi xem nội dung của khách hàng."
    columns:
      - name: contract
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('int_contracts')
              field: contract
      - name: active_days
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 31

  - name: fct_customer_search_taste
    description: "Bảng phân tích sự thay đổi sở thích (taste) của khách hàng."
    columns:
      - name: user_id
        tests:
          - not_null
          - relationships:
              to: ref('int_users')
              field: user_id
      - name: taste_status
        tests:
          - accepted_values:
              values: ['New', 'Churned', 'Unchanged', 'Changed']
