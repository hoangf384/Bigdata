version: 2

sources:
  - name: raw
    schema: main
    description: "Dữ liệu thô từ hệ thống log"
    tables:
      - name: log_content
        description: "Raw JSON content viewing logs from users."
        config:
          external_location: "../data/raw/log_content/*.json"
          format: json
        
      - name: log_search
        description: "Raw Parquet search logs from users."
        config:
          external_location: "../data/raw/log_search/**/*.parquet"
          format: parquet

      - name: contracts
        description: "Raw Parquet contract and equipment definitions."
        config:
          external_location: "../data/raw/contracts/*.parquet"
          format: parquet
        
      - name: user_registrations
        description: "Raw CSV user registration logs."
        config:
          external_location: "../data/raw/users/big_data_userid.csv"
          format: csv

      - name: thang4
        description: "Raw CSV viewership log for April."
        config:
          external_location: "../data/raw/months/thang4.csv"
          format: csv

      - name: thang5
        description: "Raw CSV viewership log for May."
        config:
          external_location: "../data/raw/months/thang5.csv"
          format: csv

      - name: thang6
        description: "Raw CSV viewership log for June."
        config:
          external_location: "../data/raw/months/thang6.csv"
          format: csv

      - name: keyword_mapping
        description: "Keyword category mapping generated by LLM (JSON)."
        config:
          external_location: "/home/hp/Bigdata/local/data/destination/log_search/category/mapping.json"
          format: json
        
